name = "crash-pastebin"
main = "worker/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[r2_buckets]]
binding = "DUMPS"
bucket_name = "crash-pastebin"

[[unsafe.bindings]]
name = "UPLOAD_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
